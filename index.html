<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سامانه گزارش‌دهی دانشگاه تربیت مدرس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ─── Theme Variables ─── */
  :root {
    --bg-primary: #f0f4f8;
    --bg-secondary: #e2eaf3;
    --bg-card: rgba(255,255,255,0.55);
    --bg-card-hover: rgba(255,255,255,0.72);
    --bg-glass: rgba(255,255,255,0.38);
    --bg-glass-strong: rgba(255,255,255,0.65);
    --border-glass: rgba(255,255,255,0.6);
    --border-subtle: rgba(0,0,0,0.07);
    --text-primary: #0f1f3d;
    --text-secondary: #3d5170;
    --text-muted: #7a8fa8;
    --accent: #1a56db;
    --accent-soft: rgba(26,86,219,0.12);
    --accent-hover: #1649c0;
    --success: #059669;
    --success-soft: rgba(5,150,105,0.12);
    --warning: #d97706;
    --warning-soft: rgba(217,119,6,0.12);
    --danger: #dc2626;
    --danger-soft: rgba(220,38,38,0.12);
    --info: #0891b2;
    --info-soft: rgba(8,145,178,0.12);
    --shadow-glass: 0 8px 32px rgba(31,58,121,0.10), 0 1.5px 4px rgba(31,58,121,0.06);
    --shadow-card: 0 4px 24px rgba(31,58,121,0.08);
    --blur: blur(18px);
    --radius: 18px;
    --radius-sm: 10px;
    --tmu-blue: #003082;
    --tmu-gold: #b8962e;
  }
  [data-theme="dark"] {
    --bg-primary: #0a0f1e;
    --bg-secondary: #0f172a;
    --bg-card: rgba(15,23,42,0.65);
    --bg-card-hover: rgba(22,33,55,0.75);
    --bg-glass: rgba(15,23,42,0.42);
    --bg-glass-strong: rgba(20,30,50,0.75);
    --border-glass: rgba(255,255,255,0.08);
    --border-subtle: rgba(255,255,255,0.05);
    --text-primary: #e8f0fe;
    --text-secondary: #94a3c8;
    --text-muted: #4f6280;
    --accent: #4a8cf7;
    --accent-soft: rgba(74,140,247,0.14);
    --accent-hover: #5f9cff;
    --success: #34d399;
    --success-soft: rgba(52,211,153,0.12);
    --warning: #fbbf24;
    --warning-soft: rgba(251,191,36,0.12);
    --danger: #f87171;
    --danger-soft: rgba(248,113,113,0.12);
    --info: #38bdf8;
    --info-soft: rgba(56,189,248,0.12);
    --shadow-glass: 0 8px 32px rgba(0,0,0,0.4), 0 1.5px 4px rgba(0,0,0,0.3);
    --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
    --tmu-blue: #4a8cf7;
    --tmu-gold: #e2b84a;
  }

  /* ─── Base ─── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Vazirmatn', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    direction: rtl;
    transition: background 0.3s, color 0.3s;
    overflow-x: hidden;
  }
  /* BG ambient blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.3s;
  }
  body::before {
    width: 600px; height: 600px;
    background: radial-gradient(circle, #1a56db 0%, transparent 70%);
    top: -100px; right: -100px;
  }
  body::after {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #b8962e 0%, transparent 70%);
    bottom: -100px; left: -100px;
  }
  [data-theme="dark"] body::before { opacity: 0.15; }
  [data-theme="dark"] body::after { opacity: 0.10; }

  /* ─── Glass Utility ─── */
  .glass {
    background: var(--bg-card);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-glass);
    box-shadow: var(--shadow-glass);
  }
  .glass-strong {
    background: var(--bg-glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border: 1px solid var(--border-glass);
    box-shadow: var(--shadow-glass);
  }

  /* ─── Pages ─── */
  .page { display: none; min-height: 100vh; position: relative; z-index: 1; }
  .page.active { display: flex; }

  /* ═══════════════════════════════════════
     AUTH PAGE
  ═══════════════════════════════════════ */
  #page-auth {
    align-items: center;
    justify-content: center;
    padding: 24px;
    flex-direction: column;
    gap: 24px;
  }
  .auth-logo-area {
    text-align: center;
    animation: fadeDown 0.6s ease both;
  }
  .tmu-emblem {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: var(--bg-card);
    backdrop-filter: var(--blur);
    border: 2px solid var(--border-glass);
    box-shadow: var(--shadow-glass);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-size: 38px;
  }
  .auth-title { font-size: 1.25rem; font-weight: 700; color: var(--text-primary); }
  .auth-subtitle { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; font-family: 'Google Sans', sans-serif; letter-spacing: 0.3px; }

  .auth-card {
    width: 100%;
    max-width: 440px;
    border-radius: var(--radius);
    padding: 36px 32px;
    animation: fadeUp 0.6s 0.1s ease both;
  }
  .auth-tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
    padding: 4px;
    margin-bottom: 28px;
  }
  .auth-tab {
    flex: 1; padding: 9px;
    border: none; cursor: pointer;
    border-radius: 8px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.9rem; font-weight: 500;
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
  }
  .auth-tab.active {
    background: var(--bg-glass-strong);
    color: var(--accent);
    box-shadow: var(--shadow-card);
    font-weight: 600;
  }
  .auth-form { display: flex; flex-direction: column; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-label { font-size: 0.84rem; font-weight: 500; color: var(--text-secondary); }
  .form-input {
    background: var(--bg-secondary);
    border: 1.5px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.92rem;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    direction: rtl;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .form-input::placeholder { color: var(--text-muted); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .btn {
    padding: 12px 20px;
    border: none; cursor: pointer;
    border-radius: var(--radius-sm);
    font-family: 'Vazirmatn', sans-serif;
    font-size: 0.92rem; font-weight: 600;
    transition: all 0.2s;
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(26,86,219,0.35);
  }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 18px rgba(26,86,219,0.45); }
  .btn-secondary {
    background: var(--bg-secondary);
    color: var(--text-secondary);
    border: 1.5px solid var(--border-subtle);
  }
  .btn-secondary:hover { background: var(--bg-card-hover); color: var(--text-primary); }
  .btn-danger { background: var(--danger-soft); color: var(--danger); border: 1.5px solid transparent; }
  .btn-danger:hover { background: var(--danger); color: #fff; }
  .btn-success { background: var(--success-soft); color: var(--success); border: 1.5px solid transparent; }
  .btn-success:hover { background: var(--success); color: #fff; }
  .btn-sm { padding: 7px 14px; font-size: 0.82rem; border-radius: 7px; }
  .btn-full { width: 100%; }
  .btn-icon { padding: 8px; border-radius: 8px; }

  .error-msg {
    background: var(--danger-soft);
    color: var(--danger);
    border: 1px solid rgba(220,38,38,0.2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 0.85rem;
    display: none;
  }
  .error-msg.show { display: block; }
  .form-hint { font-size: 0.78rem; color: var(--text-muted); margin-top: 2px; }

  /* ═══════════════════════════════════════
     DASHBOARD LAYOUT
  ═══════════════════════════════════════ */
  #page-dashboard {
    flex-direction: column;
  }
  /* Topbar */
  .topbar {
    height: 64px;
    padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass-strong);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    border-bottom: 1px solid var(--border-glass);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .topbar-brand {
    display: flex; align-items: center; gap: 12px;
  }
  .topbar-logo { font-size: 24px; }
  .topbar-name { font-weight: 700; font-size: 1rem; color: var(--text-primary); }
  .topbar-sub { font-size: 0.72rem; color: var(--text-muted); font-family: 'Google Sans', sans-serif; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .user-chip {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    border-radius: 50px;
    padding: 6px 14px 6px 8px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .user-chip:hover { background: var(--bg-card-hover); }
  .user-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    color: #fff;
  }
  .user-chip-name { font-size: 0.84rem; font-weight: 500; }
  .user-chip-role { font-size: 0.7rem; color: var(--text-muted); }
  .theme-btn {
    background: var(--bg-card);
    border: 1px solid var(--border-glass);
    width: 38px; height: 38px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }
  .theme-btn:hover { background: var(--bg-card-hover); transform: rotate(20deg); }

  /* Dashboard Body */
  .dash-body {
    display: flex; flex: 1;
    min-height: calc(100vh - 64px);
  }
  /* Sidebar */
  .sidebar {
    width: 240px;
    min-height: 100%;
    padding: 20px 12px;
    display: flex; flex-direction: column; gap: 4px;
    border-left: 1px solid var(--border-glass);
    background: var(--bg-glass);
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    flex-shrink: 0;
  }
  .sidebar-section { font-size: 0.7rem; font-weight: 600; color: var(--text-muted); padding: 12px 12px 6px; letter-spacing: 0.5px; text-transform: uppercase; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 0.88rem; font-weight: 500;
    color: var(--text-secondary);
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--bg-card); color: var(--text-primary); border-color: var(--border-glass); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); border-color: rgba(26,86,219,0.2); font-weight: 600; }
  .nav-item .nav-icon { font-size: 18px; width: 20px; text-align: center; flex-shrink: 0; }
  .nav-badge {
    margin-right: auto;
    background: var(--danger);
    color: #fff;
    border-radius: 50px;
    padding: 2px 7px;
    font-size: 0.7rem;
    font-weight: 600;
  }
  .sidebar-spacer { flex: 1; }

  /* Main Content */
  .main-content {
    flex: 1;
    padding: 28px;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 24px;
  }
  .panel { display: none; flex-direction: column; gap: 20px; }
  .panel.active { display: flex; }
  .panel-title {
    font-size: 1.3rem; font-weight: 700; color: var(--text-primary);
    display: flex; align-items: center; gap: 10px;
  }
  .panel-title .icon { font-size: 1.4rem; }

  /* Cards */
  .card {
    border-radius: var(--radius);
    padding: 24px;
  }
  .card-sm { padding: 16px 20px; border-radius: var(--radius-sm); }

  /* Stats Grid */
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
  .stat-card {
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 8px;
    transition: transform 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); }
  .stat-icon { font-size: 28px; }
  .stat-val { font-size: 2rem; font-weight: 800; font-family: 'Google Sans', sans-serif; }
  .stat-label { font-size: 0.82rem; color: var(--text-muted); }

  /* Table */
  .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  thead tr { background: var(--bg-secondary); }
  th { padding: 12px 16px; text-align: right; font-weight: 600; color: var(--text-secondary); font-size: 0.8rem; white-space: nowrap; }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); color: var(--text-primary); }
  tbody tr:hover { background: var(--bg-card-hover); }
  tbody tr:last-child td { border-bottom: none; }

  /* Badge */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 0.76rem; font-weight: 600;
  }
  .badge-blue { background: var(--accent-soft); color: var(--accent); }
  .badge-green { background: var(--success-soft); color: var(--success); }
  .badge-yellow { background: var(--warning-soft); color: var(--warning); }
  .badge-red { background: var(--danger-soft); color: var(--danger); }
  .badge-gray { background: var(--bg-secondary); color: var(--text-muted); }

  /* Priority colors */
  .prio-0 { background: var(--bg-secondary); color: var(--text-muted); }
  .prio-1 { background: var(--info-soft); color: var(--info); }
  .prio-2 { background: var(--warning-soft); color: var(--warning); }
  .prio-3 { background: var(--danger-soft); color: var(--danger); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    width: 100%; max-width: 520px;
    border-radius: var(--radius);
    padding: 28px;
    animation: fadeUp 0.25s ease;
    max-height: 90vh;
    overflow-y: auto;
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .modal-title { font-size: 1.1rem; font-weight: 700; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 22px; color: var(--text-muted); line-height: 1; padding: 2px; }
  .modal-close:hover { color: var(--text-primary); }
  .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border-subtle); }

  /* Message Card */
  .msg-card {
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-bottom: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
    border: 1px solid var(--border-glass);
  }
  .msg-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-glass); }
  .msg-card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .msg-card-title { font-weight: 600; font-size: 0.95rem; flex: 1; }
  .msg-card-meta { font-size: 0.78rem; color: var(--text-muted); }
  .msg-card-body { font-size: 0.86rem; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  /* Notification Toast */
  .toast-area {
    position: fixed; bottom: 24px; left: 24px;
    z-index: 300;
    display: flex; flex-direction: column; gap: 10px;
    pointer-events: none;
  }
  .toast {
    background: var(--bg-glass-strong);
    backdrop-filter: var(--blur);
    border: 1px solid var(--border-glass);
    border-radius: var(--radius-sm);
    padding: 12px 18px;
    font-size: 0.88rem;
    box-shadow: var(--shadow-glass);
    display: flex; align-items: center; gap: 10px;
    animation: slideUp 0.3s ease, fadeOut 0.4s 2.6s ease forwards;
    pointer-events: all;
    min-width: 260px;
    max-width: 360px;
  }
  .toast.success { border-right: 3px solid var(--success); }
  .toast.error { border-right: 3px solid var(--danger); }
  .toast.info { border-right: 3px solid var(--accent); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 0.95rem; }

  /* Section header */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap; gap: 10px;
  }
  .section-title { font-size: 1rem; font-weight: 600; }

  /* Reply thread */
  .reply-thread { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; }
  .reply-item {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-secondary);
    font-size: 0.86rem;
    border-right: 3px solid var(--border-subtle);
  }
  .reply-item.from-manager { border-right-color: var(--accent); }
  .reply-item.from-admin { border-right-color: var(--tmu-gold); }
  .reply-meta { font-size: 0.76rem; color: var(--text-muted); margin-bottom: 4px; }

  /* ─── Animations ─── */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; transform: translateY(-8px); } }

  /* ─── Responsive ─── */
  @media(max-width: 768px) {
    .sidebar { width: 60px; }
    .sidebar-section, .nav-item span, .user-chip-name, .user-chip-role, .topbar-sub { display: none; }
    .nav-item { justify-content: center; padding: 12px; }
    .main-content { padding: 16px; }
    .form-row { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
  }
  @media(max-width: 480px) {
    .stats-grid { grid-template-columns: 1fr; }
    .auth-card { padding: 24px 18px; }
  }

  /* ─── Select input ─── */
  select.form-input { appearance: none; cursor: pointer; }
  textarea.form-input { resize: vertical; min-height: 100px; }

  /* ─── Switch ─── */
  .switch-wrap { display: flex; align-items: center; gap: 10px; }
  .switch { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: var(--bg-secondary);
    border: 1.5px solid var(--border-subtle);
    border-radius: 50px;
    cursor: pointer;
    transition: 0.2s;
  }
  .slider::before {
    content: ''; position: absolute;
    width: 18px; height: 18px;
    bottom: 2px; right: 2px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: 0.2s;
  }
  input:checked + .slider { background: var(--accent); border-color: var(--accent); }
  input:checked + .slider::before { background: #fff; transform: translateX(-20px); }

  /* scroll styles */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-glass); border-radius: 10px; }

  /* search input */
  .search-wrap { position: relative; }
  .search-wrap .search-icon { position: absolute; top: 50%; transform: translateY(-50%); right: 12px; font-size: 16px; color: var(--text-muted); pointer-events: none; }
  .search-wrap .form-input { padding-right: 38px; }
</style>
</head>
<body>
<!-- ══════════════════════════════════════════ AUTH PAGE ══════════════════════════════════════════ -->
<div id="page-auth" class="page active">
  <div class="auth-logo-area">
    <div class="tmu-emblem">🎓</div>
    <div class="auth-title">سامانه گزارش‌دهی</div>
    <div class="auth-subtitle">Tarbiat Modares University · Tehran, Iran</div>
  </div>
  <div class="auth-card glass">

<script>
// ══════════════════════════════════════════════════════════════
//  DATA STORE
// ══════════════════════════════════════════════════════════════
let DB = {
  users: [
    { id:'admin', username:'ADMIN', password:'Ahmad@2654', role:'admin', name:'مدیر سیستم', email:'admin@modares.ac.ir', phone:'', blocked:false, joined: new Date().toLocaleDateString('fa-IR') }
  ],
  managers: [],
  messages: [],
  _nextMsgId: 1,
  _nextUserId: 100,
  _nextMgrId: 10
};

// Try load from localStorage
try {
  const saved = localStorage.getItem('tmu_db');
  if (saved) DB = JSON.parse(saved);
} catch(e) {}

function saveDB() {
  try { localStorage.setItem('tmu_db', JSON.stringify(DB)); } catch(e) {}
}

// ══════════════════════════════════════════════════════════════
//  THEME
// ══════════════════════════════════════════════════════════════
let currentTheme = localStorage.getItem('tmu_theme') || 'auto';
function applyTheme() {
  const isDark = currentTheme === 'dark' || (currentTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
  document.querySelector('.theme-btn').textContent = isDark ? '☀️' : '🌙';
}
function toggleTheme() {
  currentTheme = currentTheme === 'dark' ? 'light' : (currentTheme === 'light' ? 'auto' : 'dark');
  localStorage.setItem('tmu_theme', currentTheme);
  applyTheme();
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
applyTheme();

// ══════════════════════════════════════════════════════════════
//  CURRENT SESSION
// ══════════════════════════════════════════════════════════════
let currentUser = null;

// ══════════════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════════════
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
  document.getElementById('form-login').style.display = tab==='login' ? '' : 'none';
  document.getElementById('form-register').style.display = tab==='register' ? '' : 'none';
}

function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.classList.remove('show');

  // Check admin
  if (u === DB.users[0].username && p === DB.users[0].password) {
    currentUser = DB.users[0];
    enterDashboard();
    return;
  }
  // Check managers
  const mgr = DB.managers.find(m => m.username === u && m.password === p);
  if (mgr) { currentUser = {...mgr, role:'manager'}; enterDashboard(); return; }
  // Check students
  const student = DB.users.find(s => s.username === u && s.password === p && s.role === 'student');
  if (student) {
    if (student.blocked) { err.textContent = 'حساب شما مسدود شده است. با مدیریت تماس بگیرید.'; err.classList.add('show'); return; }
    currentUser = student;
    enterDashboard();
    return;
  }
  err.textContent = 'نام کاربری یا رمز عبور اشتباه است.';
  err.classList.add('show');
}

function doRegister() {
  const fname = document.getElementById('reg-fname').value.trim();
  const lname = document.getElementById('reg-lname').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const uname = document.getElementById('reg-uname').value.trim().toLowerCase();
  const pass  = document.getElementById('reg-pass').value;
  const err = document.getElementById('reg-error');
  err.classList.remove('show');

  if (!fname||!lname||!email||!phone||!uname||!pass) { err.textContent='همه فیلدها را پر کنید.'; err.classList.add('show'); return; }
  if (!email.endsWith('@modares.ac.ir')) { err.textContent='ایمیل باید با @modares.ac.ir ختم شود.'; err.classList.add('show'); return; }
  if (pass.length < 6) { err.textContent='رمز عبور باید حداقل ۶ کاراکتر باشد.'; err.classList.add('show'); return; }
  if (DB.users.find(u=>u.username===uname) || DB.managers.find(m=>m.username===uname) || uname==='admin') {
    err.textContent='این نام کاربری قبلاً گرفته شده است.'; err.classList.add('show'); return;
  }
  const newUser = {
    id: 'u'+DB._nextUserId++,
    username: uname, password: pass, role:'student',
    name: fname+' '+lname, email, phone, blocked:false,
    joined: new Date().toLocaleDateString('fa-IR')
  };
  DB.users.push(newUser);
  saveDB();
  toast('ثبت‌نام با موفقیت انجام شد. اکنون وارد شوید.', 'success');
  document.getElementById('reg-fname').value='';document.getElementById('reg-lname').value='';
  document.getElementById('reg-email').value='';document.getElementById('reg-phone').value='';
  document.getElementById('reg-uname').value='';document.getElementById('reg-pass').value='';
  switchAuthTab('login');
  document.getElementById('login-username').value = uname;
}

function doLogout() {
  currentUser = null;
  document.getElementById('page-dashboard').classList.remove('active');
  document.getElementById('page-auth').classList.add('active');
  document.getElementById('login-username').value='';
  document.getElementById('login-password').value='';
}

// ══════════════════════════════════════════════════════════════
//  DASHBOARD
// ══════════════════════════════════════════════════════════════
function enterDashboard() {
  document.getElementById('page-auth').classList.remove('active');
  document.getElementById('page-dashboard').classList.add('active');
  document.getElementById('topbar-name').textContent = currentUser.name;
  document.getElementById('topbar-role').textContent = currentUser.role==='admin'?'مدیر سیستم':currentUser.role==='manager'?'مسئول':'دانشجو';
  const av = document.getElementById('topbar-avatar');
  av.textContent = currentUser.name.charAt(0);
  av.style.background = currentUser.role==='admin'?'#b8962e':currentUser.role==='manager'?'#059669':'#1a56db';
  buildSidebar();
  showPanel(currentUser.role==='admin'?'admin-overview':currentUser.role==='manager'?'mgr-inbox':'stu-send');
}

function buildSidebar() {
  const sb = document.getElementById('sidebar');
  let html = '';
  if (currentUser.role === 'admin') {
    html = `
      <div class="sidebar-section">مدیریت</div>
      <div class="nav-item" onclick="showPanel('admin-overview')"><span class="nav-icon">📊</span><span>داشبورد</span></div>
      <div class="nav-item" onclick="showPanel('admin-users')"><span class="nav-icon">👥</span><span>کاربران</span></div>
      <div class="nav-item" onclick="showPanel('admin-managers')"><span class="nav-icon">🗂️</span><span>مسئولان</span></div>
      <div class="nav-item" onclick="showPanel('admin-messages')"><span class="nav-icon">📨</span><span>همه پیام‌ها</span></div>
      <div class="sidebar-spacer"></div>`;
  } else if (currentUser.role === 'manager') {
    html = `
      <div class="sidebar-section">پنل مسئول</div>
      <div class="nav-item" onclick="showPanel('mgr-inbox')"><span class="nav-icon">📥</span><span>صندوق ورودی</span><span class="nav-badge" id="mgr-badge"></span></div>
      <div class="nav-item" onclick="showPanel('mgr-report')"><span class="nav-icon">📋</span><span>گزارش به مدیر</span></div>
      <div class="sidebar-spacer"></div>`;
  } else {
    html = `
      <div class="sidebar-section">پنل دانشجو</div>
      <div class="nav-item" onclick="showPanel('stu-send')"><span class="nav-icon">✏️</span><span>گزارش جدید</span></div>
      <div class="nav-item" onclick="showPanel('stu-sent')"><span class="nav-icon">📤</span><span>گزارش‌های من</span></div>
      <div class="sidebar-spacer"></div>`;
  }
  sb.innerHTML = html;
}

let currentPanel = '';
function showPanel(name) {
  currentPanel = name;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const active = document.querySelector(`.nav-item[onclick*="${name}"]`);
  if (active) active.classList.add('active');
  const mc = document.getElementById('main-content');

  if (name === 'admin-overview')   mc.innerHTML = buildAdminOverview();
  else if (name === 'admin-users')      mc.innerHTML = buildAdminUsers();
  else if (name === 'admin-managers')   mc.innerHTML = buildAdminManagers();
  else if (name === 'admin-messages')   mc.innerHTML = buildAdminMessages();
  else if (name === 'mgr-inbox')        mc.innerHTML = buildMgrInbox();
  else if (name === 'mgr-report')       mc.innerHTML = buildMgrReport();
  else if (name === 'stu-send')         mc.innerHTML = buildStuSend();
  else if (name === 'stu-sent')         mc.innerHTML = buildStuSent();
}

// ══════════════════════════════════════════════════════════════
//  PANEL BUILDERS
// ══════════════════════════════════════════════════════════════

// ADMIN OVERVIEW
function buildAdminOverview() {
  const students = DB.users.filter(u=>u.role==='student');
  const totalMsgs = DB.messages.length;
  const openMsgs = DB.messages.filter(m=>m.status!=='closed').length;
  const highPrio = DB.messages.filter(m=>m.priority>=2).length;
  const blocked = students.filter(u=>u.blocked).length;
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">📊</span> داشبورد مدیریت</div>
      <div class="stats-grid">
        <div class="stat-card glass"><div class="stat-icon">👥</div><div class="stat-val">${students.length}</div><div class="stat-label">دانشجو ثبت‌نام شده</div></div>
        <div class="stat-card glass"><div class="stat-icon">📨</div><div class="stat-val">${totalMsgs}</div><div class="stat-label">کل پیام‌ها</div></div>
        <div class="stat-card glass"><div class="stat-icon">🔓</div><div class="stat-val">${openMsgs}</div><div class="stat-label">پیام‌های باز</div></div>
        <div class="stat-card glass"><div class="stat-icon">🚨</div><div class="stat-val">${highPrio}</div><div class="stat-label">اولویت بالا</div></div>
        <div class="stat-card glass"><div class="stat-icon">🗂️</div><div class="stat-val">${DB.managers.length}</div><div class="stat-label">مسئول فعال</div></div>
        <div class="stat-card glass"><div class="stat-icon">🔒</div><div class="stat-val">${blocked}</div><div class="stat-label">کاربر مسدود</div></div>
      </div>
      <div class="card glass">
        <div class="section-header"><div class="section-title">📨 آخرین پیام‌ها</div></div>
        ${DB.messages.length===0?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">هنوز پیامی ثبت نشده</div></div>':
        DB.messages.slice(-5).reverse().map(m=>msgCardHtml(m,'admin')).join('')}
      </div>
    </div>`;
}

// ADMIN USERS
function buildAdminUsers() {
  const students = DB.users.filter(u=>u.role==='student');
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">👥</span> مدیریت دانشجویان</div>
      <div class="card glass">
        <div class="section-header">
          <div class="section-title">${students.length} دانشجو</div>
          <div class="search-wrap"><span class="search-icon">🔍</span><input class="form-input" style="width:220px" placeholder="جستجو..." id="user-search" oninput="filterUsers(this.value)" /></div>
        </div>
        <div class="table-wrap" id="users-table">${buildUsersTable(students)}</div>
      </div>
    </div>`;
}
function buildUsersTable(students) {
  if (!students.length) return '<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-text">دانشجویی یافت نشد</div></div>';
  return `<table><thead><tr><th>نام</th><th>نام کاربری</th><th>ایمیل</th><th>تلفن</th><th>تاریخ عضویت</th><th>وضعیت</th><th>عملیات</th></tr></thead><tbody>
    ${students.map(u=>`
    <tr>
      <td>${u.name}</td><td dir="ltr">${u.username}</td><td dir="ltr">${u.email}</td><td dir="ltr">${u.phone}</td><td>${u.joined}</td>
      <td><span class="badge ${u.blocked?'badge-red':'badge-green'}">${u.blocked?'🔒 مسدود':'✅ فعال'}</span></td>
      <td style="display:flex;gap:6px">
        <button class="btn btn-sm ${u.blocked?'btn-success':'btn-danger'}" onclick="toggleBlock('${u.id}')">${u.blocked?'رفع مسدودی':'مسدود کردن'}</button>
        <button class="btn btn-sm btn-secondary" onclick="viewUserMsgs('${u.id}')">پیام‌ها</button>
      </td>
    </tr>`).join('')}
  </tbody></table>`;
}
function filterUsers(q) {
  const students = DB.users.filter(u=>u.role==='student').filter(u=>u.name.includes(q)||u.username.includes(q)||u.email.includes(q));
  document.getElementById('users-table').innerHTML = buildUsersTable(students);
}
function toggleBlock(uid) {
  const u = DB.users.find(u=>u.id===uid);
  if (!u) return;
  u.blocked = !u.blocked;
  saveDB();
  toast(u.blocked?'کاربر مسدود شد.':'مسدودیت رفع شد.', u.blocked?'error':'success');
  showPanel('admin-users');
}
function viewUserMsgs(uid) {
  const u = DB.users.find(u=>u.id===uid);
  const msgs = DB.messages.filter(m=>m.senderId===uid);
  showGenericMsgsModal(msgs, `پیام‌های ${u.name}`);
}

// ADMIN MANAGERS
function buildAdminManagers() {
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">🗂️</span> مدیریت مسئولان</div>
      <div class="card glass">
        <div class="section-header">
          <div class="section-title">${DB.managers.length} مسئول</div>
          <button class="btn btn-primary btn-sm" onclick="openModal('modal-add-manager')">+ افزودن مسئول</button>
        </div>
        <div class="table-wrap">
          ${DB.managers.length===0?'<div class="empty-state"><div class="empty-icon">🗂️</div><div class="empty-text">مسئولی تعریف نشده است</div></div>':
          `<table><thead><tr><th>نام</th><th>سمت</th><th>نام کاربری</th><th>تعداد پیام</th><th>عملیات</th></tr></thead><tbody>
            ${DB.managers.map(m=>`<tr>
              <td>${m.name}</td><td>${m.title}</td><td dir="ltr">${m.username}</td>
              <td>${DB.messages.filter(msg=>msg.managerId===m.id).length}</td>
              <td style="display:flex;gap:6px">
                <button class="btn btn-sm btn-secondary" onclick="viewMgrMsgs('${m.id}')">پیام‌ها</button>
                <button class="btn btn-sm btn-danger" onclick="deleteManager('${m.id}')">حذف</button>
              </td>
            </tr>`).join('')}
          </tbody></table>`}
        </div>
      </div>
    </div>`;
}
function addManager() {
  const name  = document.getElementById('mgr-name').value.trim();
  const title = document.getElementById('mgr-title').value.trim();
  const uname = document.getElementById('mgr-uname').value.trim().toLowerCase();
  const pass  = document.getElementById('mgr-pass').value;
  const err   = document.getElementById('mgr-error');
  err.classList.remove('show');
  if (!name||!title||!uname||!pass) { err.textContent='همه فیلدها را پر کنید.'; err.classList.add('show'); return; }
  if (DB.users.find(u=>u.username===uname)||DB.managers.find(m=>m.username===uname)||uname==='admin') {
    err.textContent='این نام کاربری قبلاً استفاده شده.'; err.classList.add('show'); return;
  }
  DB.managers.push({ id:'m'+DB._nextMgrId++, name, title, username:uname, password:pass });
  saveDB();
  closeModal('modal-add-manager');
  toast('مسئول با موفقیت اضافه شد.', 'success');
  showPanel('admin-managers');
}
function deleteManager(mid) {
  if (!confirm('آیا مطمئنید که می‌خواهید این مسئول را حذف کنید؟')) return;
  DB.managers = DB.managers.filter(m=>m.id!==mid);
  saveDB();
  toast('مسئول حذف شد.', 'info');
  showPanel('admin-managers');
}
function viewMgrMsgs(mid) {
  const m = DB.managers.find(m=>m.id===mid);
  const msgs = DB.messages.filter(msg=>msg.managerId===mid);
  showGenericMsgsModal(msgs, `پیام‌های ${m.name}`);
}

// ADMIN ALL MESSAGES
function buildAdminMessages() {
  const msgs = [...DB.messages].reverse();
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">📨</span> همه پیام‌ها (${DB.messages.length})</div>
      <div class="card glass">
        ${msgs.length===0?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">هیچ پیامی وجود ندارد</div></div>':
        msgs.map(m=>msgCardHtml(m,'admin')).join('')}
      </div>
    </div>`;
}

// MANAGER INBOX
function buildMgrInbox() {
  const msgs = DB.messages.filter(m=>m.managerId===currentUser.id).reverse();
  const unread = msgs.filter(m=>m.status==='open').length;
  const badge = document.getElementById('mgr-badge');
  if (badge) badge.textContent = unread||'';
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">📥</span> صندوق ورودی <span style="font-size:0.85rem;font-weight:500;color:var(--text-muted);margin-right:8px">${msgs.length} پیام</span></div>
      <div class="card glass">
        ${msgs.length===0?'<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">هنوز پیامی دریافت نکرده‌اید</div></div>':
        msgs.map(m=>msgCardHtml(m,'manager')).join('')}
      </div>
    </div>`;
}

// MANAGER REPORT
function buildMgrReport() {
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">📋</span> گزارش به مدیر سیستم</div>
      <div class="card glass" style="max-width:560px">
        <div class="auth-form">
          <div class="form-group"><label class="form-label">موضوع</label><input type="text" id="rpt-subject" class="form-input" placeholder="موضوع گزارش" /></div>
          <div class="form-group"><label class="form-label">متن گزارش</label><textarea id="rpt-body" class="form-input" placeholder="گزارش خود را بنویسید..."></textarea></div>
          <button class="btn btn-primary" onclick="sendManagerReport()">ارسال گزارش به مدیر</button>
        </div>
      </div>
    </div>`;
}
function sendManagerReport() {
  const subj = document.getElementById('rpt-subject').value.trim();
  const body = document.getElementById('rpt-body').value.trim();
  if (!subj||!body) { toast('موضوع و متن را پر کنید.','error'); return; }
  // Send as internal message to admin
  DB.messages.push({
    id: 'msg'+DB._nextMsgId++,
    senderId: currentUser.id, senderName: currentUser.name,
    managerId: 'admin-report', managerName: 'مدیر سیستم',
    subject: subj, body, priority: 2, status:'open',
    date: new Date().toLocaleDateString('fa-IR'),
    time: new Date().toLocaleTimeString('fa-IR', {hour:'2-digit',minute:'2-digit'}),
    replies:[], isManagerReport: true
  });
  saveDB();
  toast('گزارش برای مدیر ارسال شد.','success');
  document.getElementById('rpt-subject').value='';document.getElementById('rpt-body').value='';
}

// STUDENT SEND
function buildStuSend() {
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">✏️</span> ارسال گزارش جدید</div>
      <div class="card glass" style="max-width:560px">
        <div class="auth-form">
          <div class="form-group"><label class="form-label">موضوع</label><input type="text" id="stu-subject" class="form-input" placeholder="موضوع گزارش" /></div>
          <div class="form-group">
            <label class="form-label">اولویت</label>
            <select id="stu-priority" class="form-input">
              <option value="0">😐 مهم نیست</option>
              <option value="1">🔵 یذره مهمه</option>
              <option value="2">🟡 مهمه</option>
              <option value="3">🔴 خیلی مهمه</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">مسئول مربوطه</label>
            <select id="stu-manager" class="form-input">
              ${DB.managers.length===0?'<option value="">هنوز مسئولی تعریف نشده</option>':
              DB.managers.map(m=>`<option value="${m.id}">${m.name} — ${m.title}</option>`).join('')}
            </select>
          </div>
          <div class="form-group"><label class="form-label">متن پیام</label><textarea id="stu-body" class="form-input" placeholder="مشکل یا گزارش خود را شرح دهید..."></textarea></div>
          <button class="btn btn-primary" onclick="sendStudentMessage()" ${DB.managers.length===0?'disabled':''}>ارسال گزارش</button>
        </div>
        ${DB.managers.length===0?'<div style="margin-top:14px;padding:12px 14px;background:var(--warning-soft);border-radius:var(--radius-sm);color:var(--warning);font-size:0.85rem">⚠️ هنوز هیچ مسئولی در سیستم تعریف نشده است. لطفاً با مدیریت تماس بگیرید.</div>':''}
      </div>
    </div>`;
}
function sendStudentMessage() {
  const subj = document.getElementById('stu-subject').value.trim();
  const prio = parseInt(document.getElementById('stu-priority').value);
  const mgid = document.getElementById('stu-manager').value;
  const body = document.getElementById('stu-body').value.trim();
  if (!subj||!body||!mgid) { toast('لطفاً تمام فیلدها را پر کنید.','error'); return; }
  const mgr = DB.managers.find(m=>m.id===mgid);
  DB.messages.push({
    id: 'msg'+DB._nextMsgId++,
    senderId: currentUser.id, senderName: currentUser.name,
    managerId: mgid, managerName: mgr.name,
    subject: subj, body, priority: prio, status:'open',
    date: new Date().toLocaleDateString('fa-IR'),
    time: new Date().toLocaleTimeString('fa-IR', {hour:'2-digit',minute:'2-digit'}),
    replies:[], isManagerReport:false
  });
  saveDB();
  toast('گزارش شما با موفقیت ارسال شد! ✅','success');
  document.getElementById('stu-subject').value='';document.getElementById('stu-body').value='';
}

// STUDENT SENT
function buildStuSent() {
  const msgs = DB.messages.filter(m=>m.senderId===currentUser.id&&!m.isManagerReport).reverse();
  return `
    <div class="panel active">
      <div class="panel-title"><span class="icon">📤</span> گزارش‌های من (${msgs.length})</div>
      <div class="card glass">
        ${msgs.length===0?'<div class="empty-state"><div class="empty-icon">📤</div><div class="empty-text">هنوز گزارشی ارسال نکرده‌اید</div></div>':
        msgs.map(m=>msgCardHtml(m,'student')).join('')}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
//  MESSAGE CARD HTML
// ══════════════════════════════════════════════════════════════
const PRIO_LABELS = ['مهم نیست','یذره مهمه','مهمه','خیلی مهمه'];
const PRIO_ICONS  = ['⚪','🔵','🟡','🔴'];
function msgCardHtml(m, role) {
  return `<div class="msg-card glass" onclick="viewMsg('${m.id}','${role}')">
    <div class="msg-card-header">
      <span class="badge prio-${m.priority}">${PRIO_ICONS[m.priority]} ${PRIO_LABELS[m.priority]}</span>
      <span class="badge ${m.status==='open'?'badge-blue':'badge-green'}">${m.status==='open'?'باز':'بسته'}</span>
      ${role==='admin'?`<span class="badge badge-gray" style="margin-right:auto">از: ${m.senderName}</span>`:''}
      ${role==='manager'?`<span class="badge badge-gray" style="margin-right:auto">از: ${m.senderName}</span>`:''}
      ${role==='student'?`<span class="badge badge-gray" style="margin-right:auto">به: ${m.managerName}</span>`:''}
    </div>
    <div class="msg-card-title">${m.subject}</div>
    <div class="msg-card-body">${m.body}</div>
    <div class="msg-card-meta">${m.date} ساعت ${m.time}</div>
  </div>`;
}

// ══════════════════════════════════════════════════════════════
//  VIEW MESSAGE MODAL
// ══════════════════════════════════════════════════════════════
function viewMsg(msgId, role) {
  const m = DB.messages.find(x=>x.id===msgId);
  if (!m) return;
  if (m.status==='open' && role==='manager') { m.status='read'; saveDB(); }

  document.getElementById('vmod-title').textContent = m.subject;
  const replyHtml = m.replies.length ? `
    <div class="reply-thread">${m.replies.map(r=>`
      <div class="reply-item ${r.fromRole==='manager'?'from-manager':r.fromRole==='admin'?'from-admin':''}">
        <div class="reply-meta">${r.senderName} · ${r.date}</div>
        <div>${r.text}</div>
      </div>`).join('')}
    </div>` : '';

  document.getElementById('vmod-body').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      <span class="badge prio-${m.priority}">${PRIO_ICONS[m.priority]} ${PRIO_LABELS[m.priority]}</span>
      <span class="badge ${m.status==='closed'?'badge-green':'badge-blue'}">${m.status==='closed'?'بسته':'باز'}</span>
    </div>
    <div style="margin-bottom:8px;font-size:0.82rem;color:var(--text-muted)">از: <b>${m.senderName}</b> &nbsp;|&nbsp; به: <b>${m.managerName}</b> &nbsp;|&nbsp; ${m.date}</div>
    <div style="background:var(--bg-secondary);border-radius:var(--radius-sm);padding:14px;line-height:1.8;font-size:0.92rem">${m.body}</div>
    ${replyHtml}`;

  const footer = document.getElementById('vmod-footer');
  const replyArea = document.getElementById('vmod-reply-area');
  document.getElementById('vmod-reply-text').value='';
  replyArea.style.display='none';

  if (role==='manager' || role==='admin') {
    footer.innerHTML = `
      <button class="btn btn-secondary" onclick="closeModal('modal-view-msg')">بستن</button>
      <button class="btn btn-secondary" onclick="toggleReplyArea()">↩ پاسخ</button>
      ${m.status!=='closed'?`<button class="btn btn-success" onclick="closeMsg('${msgId}')">✓ بستن پرونده</button>`:''}
      <button class="btn btn-primary" onclick="submitReply('${msgId}','${role}')">ارسال پاسخ</button>`;
  } else {
    footer.innerHTML = `<button class="btn btn-secondary" onclick="closeModal('modal-view-msg')">بستن</button>`;
  }
  openModal('modal-view-msg');
}

function toggleReplyArea() {
  const a = document.getElementById('vmod-reply-area');
  a.style.display = a.style.display==='none'?'block':'none';
}
function submitReply(msgId, role) {
  const text = document.getElementById('vmod-reply-text').value.trim();
  if (!text) { toast('متن پاسخ خالی است.','error'); return; }
  const m = DB.messages.find(x=>x.id===msgId);
  m.replies.push({ senderName: currentUser.name, fromRole: role, text, date: new Date().toLocaleDateString('fa-IR') });
  saveDB();
  closeModal('modal-view-msg');
  toast('پاسخ ثبت شد.','success');
  showPanel(currentPanel);
}
function closeMsg(msgId) {
  const m = DB.messages.find(x=>x.id===msgId);
  m.status='closed'; saveDB();
  closeModal('modal-view-msg');
  toast('پرونده بسته شد.','info');
  showPanel(currentPanel);
}

// ══════════════════════════════════════════════════════════════
//  GENERIC MSGS MODAL
// ══════════════════════════════════════════════════════════════
function showGenericMsgsModal(msgs, title) {
  document.getElementById('vmod-title').textContent = title;
  document.getElementById('vmod-body').innerHTML = msgs.length===0
    ? '<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">هیچ پیامی وجود ندارد</div></div>'
    : msgs.map(m=>msgCardHtml(m,'admin')).join('');
  document.getElementById('vmod-reply-area').style.display='none';
  document.getElementById('vmod-footer').innerHTML=`<button class="btn btn-secondary" onclick="closeModal('modal-view-msg')">بستن</button>`;
  openModal('modal-view-msg');
}

// ══════════════════════════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-overlay').forEach(ov => ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('open'); }));

// ══════════════════════════════════════════════════════════════
//  TOAST
// ══════════════════════════════════════════════════════════════
function toast(msg, type='info') {
  const ta = document.getElementById('toast-area');
  const icons = { success:'✅', error:'❌', info:'ℹ️' };
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  ta.appendChild(el);
  setTimeout(()=>el.remove(), 3200);
}

// ══════════════════════════════════════════════════════════════
//  PROFILE PLACEHOLDER
// ══════════════════════════════════════════════════════════════
function showProfile() { toast('نام کاربری: '+currentUser.username,'info'); }

// ══════════════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ══════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key==='Escape') document.querySelectorAll('.modal-overlay.open').forEach(m=>m.classList.remove('open'));
  if (e.key==='Enter' && document.getElementById('page-auth').classList.contains('active')) {
    if (document.getElementById('form-login').style.display!=='none') doLogin();
  }
});

// Auto dark mode observer
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applyTheme);
</script>
